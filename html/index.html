<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>温湿度センサー モニター</title>
    <script src="https://cdn.jsdelivr.net/npm/luxon@3.4.4/build/global/luxon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3.1/dist/chartjs-adapter-luxon.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #0a0e27;
            --bg-secondary: #151935;
            --bg-card: #1a1f3a;
            --bg-card-hover: #1f2545;
            --accent-primary: #3b82f6;
            --accent-secondary: #06b6d4;
            --accent-success: #10b981;
            --accent-warning: #f59e0b;
            --accent-error: #ef4444;
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --border-color: #2d3250;
            --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, #0d1224 100%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 2rem;
            overflow-x: hidden;
        }

        .container { max-width: 1400px; margin: 0 auto; animation: fadeIn 0.6s ease-out; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .header { margin-bottom: 2.5rem; animation: slideDown 0.5s ease-out; }

        @keyframes slideDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--accent-secondary), var(--accent-primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        .header p {
            font-size: 1rem;
            color: var(--text-secondary);
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.02em;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.75rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .stat-card:hover { transform: translateY(-4px); background: var(--bg-card-hover); border-color: var(--accent-primary); box-shadow: var(--shadow-lg); }
        .stat-card:hover::before { opacity: 1; }

        .stat-card .label {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .stat-card .value-container { display: flex; align-items: baseline; margin-bottom: 0.75rem; }

        .stat-card .value {
            font-size: 3rem;
            font-weight: 700;
            line-height: 1;
            background: linear-gradient(135deg, #fff, var(--text-primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-card .unit { font-size: 1.5rem; color: var(--text-secondary); margin-left: 0.5rem; font-weight: 500; }
        .stat-card .timestamp { font-size: 0.8rem; color: var(--text-secondary); font-family: 'JetBrains Mono', monospace; }

        .temperature .value { background: linear-gradient(135deg, #f59e0b, #ef4444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .humidity .value { background: linear-gradient(135deg, #06b6d4, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .status-indicator {
            display: inline-block;
            width: 10px; height: 10px;
            border-radius: 50%;
            animation: pulse 2s infinite;
            box-shadow: 0 0 10px currentColor;
        }

        .status-indicator.online { background: var(--accent-success); }
        .status-indicator.offline { background: var(--accent-error); }

        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(0.95); } }

        .chart-container {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
            transition: all 0.3s ease;
        }

        .chart-container:hover { border-color: var(--accent-primary); box-shadow: var(--shadow-lg); }

        .chart-container h2 {
            font-size: 1.25rem;
            margin-bottom: 1.5rem;
            color: var(--text-primary);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .chart-wrapper { position: relative; height: 350px; }

        .loading { text-align: center; padding: 4rem; color: var(--text-secondary); }

        .spinner {
            width: 40px; height: 40px;
            margin: 0 auto 1.5rem;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--accent-error);
            color: var(--text-primary);
            padding: 1.5rem;
            border-radius: 12px;
            text-align: center;
            margin: 2rem 0;
        }

        .refresh-info {
            text-align: center;
            color: var(--text-secondary);
            margin-top: 2rem;
            font-size: 0.875rem;
            font-family: 'JetBrains Mono', monospace;
            padding: 1rem 1rem 1.25rem;
            background: var(--bg-card);
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .refresh-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.875rem;
            padding: 0.55rem 1.3rem;
            background: transparent;
            border: 1px solid var(--accent-primary);
            border-radius: 8px;
            color: var(--accent-primary);
            font-size: 0.875rem;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .refresh-btn:hover { background: rgba(59, 130, 246, 0.12); box-shadow: 0 0 12px rgba(59, 130, 246, 0.2); }
        .refresh-btn:active { transform: scale(0.97); }

        .refresh-btn .icon { display: inline-block; transition: transform 0.5s ease; }
        .refresh-btn.loading .icon { animation: spin 0.8s linear infinite; }
        .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .info-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid var(--accent-primary);
            border-radius: 20px;
            font-size: 0.75rem;
            margin-left: 0.5rem;
            color: var(--accent-primary);
        }

        @media (max-width: 768px) {
            body { padding: 1rem; }
            .header h1 { font-size: 2rem; }
            .stats-grid { grid-template-columns: 1fr; }
            .stat-card .value { font-size: 2.5rem; }
            .chart-wrapper { height: 300px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌡️ 温湿度センサー モニター</h1>
            <p>Raspberry Pi Zero 2 W + AM2302 <span class="info-badge">リアルタイム監視</span></p>
        </div>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>データを読み込み中...</p>
        </div>

        <div id="error" class="error" style="display: none;"></div>

        <div id="dashboard" style="display: none;">
            <div class="stats-grid">
                <div class="stat-card temperature">
                    <div class="label">
                        <span class="status-indicator" id="status-temp"></span>
                        現在の温度
                    </div>
                    <div class="value-container">
                        <span class="value" id="current-temp">--</span>
                        <span class="unit">°C</span>
                    </div>
                    <div class="timestamp" id="temp-time">--</div>
                </div>

                <div class="stat-card humidity">
                    <div class="label">
                        <span class="status-indicator" id="status-hum"></span>
                        現在の湿度
                    </div>
                    <div class="value-container">
                        <span class="value" id="current-hum">--</span>
                        <span class="unit">%</span>
                    </div>
                    <div class="timestamp" id="hum-time">--</div>
                </div>
            </div>

            <div class="chart-container">
                <h2>🌡️ 温度推移（過去24時間）</h2>
                <div class="chart-wrapper">
                    <canvas id="tempChart"></canvas>
                </div>
            </div>

            <div class="chart-container">
                <h2>💧 湿度推移（過去24時間）</h2>
                <div class="chart-wrapper">
                    <canvas id="humChart"></canvas>
                </div>
            </div>
        </div>

        <div class="refresh-info">
            ⏱️ 5分ごとに自動更新 | 最終更新: <span id="last-update">--</span>
            <br>
            <button class="refresh-btn" id="refresh-btn" onclick="manualRefresh()">
                <span class="icon">↻</span> 今すぐ更新
            </button>
        </div>
    </div>

    <script>
        const BLOB_URL = './sensor.json';
        let tempChart = null;
        let humChart = null;

        function parseJSONL(text) {
            return text.trim().split('\n').map(line => {
                try { return JSON.parse(line); } catch (e) { return null; }
            }).filter(data => data !== null);
        }

        function formatTime(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleString('ja-JP', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
        }

        async function fetchAndDisplayData() {
            try {
                const FETCH_BYTES = 200 * 1024;
                const url = BLOB_URL + '?t=' + Date.now();
                let text;
                const headRes = await fetch(url, { method: 'HEAD' });
                if (headRes.ok) {
                    const contentLength = parseInt(headRes.headers.get('Content-Length') || '0', 10);
                    if (contentLength > FETCH_BYTES) {
                        const start = contentLength - FETCH_BYTES;
                        const rangeRes = await fetch(url, { headers: { 'Range': `bytes=${start}-` } });
                        if (!rangeRes.ok && rangeRes.status !== 206) throw new Error('データの取得に失敗しました');
                        text = await rangeRes.text();
                    } else {
                        const res = await fetch(url);
                        if (!res.ok) throw new Error('データの取得に失敗しました');
                        text = await res.text();
                    }
                } else {
                    const res = await fetch(url);
                    if (!res.ok) throw new Error('データの取得に失敗しました');
                    text = await res.text();
                }

                const allData = parseJSONL(text);
                if (allData.length === 0) throw new Error('データが見つかりません');

                const successData = allData.filter(d => d.success && d.temperature !== null);
                const latest = allData[allData.length - 1];

                const statusTemp = document.getElementById('status-temp');
                const statusHum = document.getElementById('status-hum');

                if (latest.success) {
                    document.getElementById('current-temp').textContent = latest.temperature.toFixed(1);
                    document.getElementById('current-hum').textContent = latest.humidity.toFixed(1);
                    document.getElementById('temp-time').textContent = formatTime(latest.timestamp);
                    document.getElementById('hum-time').textContent = formatTime(latest.timestamp);
                    statusTemp.className = 'status-indicator online';
                    statusHum.className = 'status-indicator online';
                } else {
                    document.getElementById('current-temp').textContent = '--';
                    document.getElementById('current-hum').textContent = '--';
                    document.getElementById('temp-time').textContent = 'センサーエラー';
                    document.getElementById('hum-time').textContent = 'センサーエラー';
                    statusTemp.className = 'status-indicator offline';
                    statusHum.className = 'status-indicator offline';
                }

                const now = new Date();
                const last24Hours = now - (24 * 60 * 60 * 1000);
                const recent24h = successData.filter(d => new Date(d.timestamp) > last24Hours);

                const dataByTime = new Map();
                recent24h.forEach(d => {
                    const ms = new Date(d.timestamp).getTime();
                    const roundedMs = Math.floor(ms / (5 * 60 * 1000)) * (5 * 60 * 1000);
                    if (!dataByTime.has(roundedMs)) dataByTime.set(roundedMs, { temperatures: [], humidities: [] });
                    const bucket = dataByTime.get(roundedMs);
                    if (d.temperature !== null) bucket.temperatures.push(d.temperature);
                    if (d.humidity !== null) bucket.humidities.push(d.humidity);
                });

                const sortedTimes = Array.from(dataByTime.keys()).sort((a, b) => a - b);
                const timestamps = sortedTimes.map(t => new Date(t));
                const tempData = sortedTimes.map(t => { const temps = dataByTime.get(t).temperatures; return temps.length > 0 ? temps.reduce((a, b) => a + b) / temps.length : null; });
                const humData = sortedTimes.map(t => { const hums = dataByTime.get(t).humidities; return hums.length > 0 ? hums.reduce((a, b) => a + b) / hums.length : null; });

                updateCharts(timestamps, tempData, humData);

                document.getElementById('last-update').textContent = new Date().toLocaleTimeString('ja-JP');
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';

            } catch (error) {
                console.error('Error:', error);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('dashboard').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = `❌ エラー: ${error.message}`;
            }
        }

        async function manualRefresh() {
            const btn = document.getElementById('refresh-btn');
            btn.classList.add('loading');
            btn.disabled = true;
            try {
                await fetchAndDisplayData();
            } finally {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        }

        function updateCharts(timestamps, tempData, humData) {
            const targetHours = [0, 6, 12, 18];
            const labeledIndices = new Set();

            targetHours.forEach(targetHour => {
                let closestIndex = -1;
                let minDiff = Infinity;
                timestamps.forEach((ts, index) => {
                    const date = new Date(ts);
                    const totalMinutes = date.getHours() * 60 + date.getMinutes();
                    const diff = Math.abs(totalMinutes - targetHour * 60);
                    if (diff < minDiff && diff < 180) { minDiff = diff; closestIndex = index; }
                });
                if (closestIndex !== -1) labeledIndices.add(closestIndex);
            });

            const labels = timestamps.map((ts, index) => {
                if (labeledIndices.has(index)) { return new Date(ts).getHours() + ':00'; }
                return '';
            });

            const commonOptions = {
                responsive: true,
                maintainAspectRatio: false,
                interaction: { mode: 'index', intersect: false },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: 'rgba(26, 31, 58, 0.95)',
                        titleColor: '#f3f4f6', bodyColor: '#f3f4f6',
                        borderColor: '#2d3250', borderWidth: 1, padding: 12,
                        titleFont: { family: 'JetBrains Mono', size: 12 },
                        bodyFont: { family: 'Inter', size: 13 },
                        callbacks: {
                            title: function(context) {
                                return new Date(timestamps[context[0].dataIndex]).toLocaleString('ja-JP');
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        grid: { color: 'rgba(45, 50, 80, 0.5)', drawBorder: false },
                        ticks: {
                            color: '#9ca3af',
                            font: { family: 'JetBrains Mono', size: 11 },
                            autoSkip: false, maxRotation: 0,
                            callback: function(value, index) { return labels[index]; }
                        }
                    },
                    y: {
                        grid: { color: 'rgba(45, 50, 80, 0.5)', drawBorder: false },
                        ticks: { font: { family: 'Inter', size: 11, weight: '500' } }
                    }
                }
            };

            if (tempChart) tempChart.destroy();
            const tempCtx = document.getElementById('tempChart').getContext('2d');
            tempChart = new Chart(tempCtx, {
                type: 'line',
                data: {
                    labels,
                    datasets: [{
                        label: '温度', data: tempData,
                        borderColor: '#f59e0b', backgroundColor: 'rgba(245, 158, 11, 0.1)',
                        borderWidth: 2, fill: true, tension: 0.4, pointRadius: 0, pointHoverRadius: 6
                    }]
                },
                options: { ...commonOptions, scales: { ...commonOptions.scales, y: { ...commonOptions.scales.y, ticks: { ...commonOptions.scales.y.ticks, color: '#f59e0b', callback: v => v.toFixed(1) + '°C' } } } }
            });

            if (humChart) humChart.destroy();
            const humCtx = document.getElementById('humChart').getContext('2d');
            humChart = new Chart(humCtx, {
                type: 'line',
                data: {
                    labels,
                    datasets: [{
                        label: '湿度', data: humData,
                        borderColor: '#06b6d4', backgroundColor: 'rgba(6, 182, 212, 0.1)',
                        borderWidth: 2, fill: true, tension: 0.4, pointRadius: 0, pointHoverRadius: 6
                    }]
                },
                options: { ...commonOptions, scales: { ...commonOptions.scales, y: { ...commonOptions.scales.y, ticks: { ...commonOptions.scales.y.ticks, color: '#06b6d4', callback: v => v.toFixed(0) + '%' }, min: 0, max: 100 } } }
            });
        }

        fetchAndDisplayData();
        setInterval(fetchAndDisplayData, 5 * 60 * 1000);
    </script>
</body>
</html>
